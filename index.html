<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PokeNexus Breeding Compatibility Chart</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue:        #2855ae;
      --blue-dark:   #1a3a7a;
      --blue-light:  #5b80d4;
      --yellow:      #f7c948;
      --yellow-dark: #d4a016;
      --red:         #cc2222;
      --offwhite:    #eef1f9;
      --gray:        #6b7280;
      --text:        #1a1a2e;
      --shadow:      rgba(40,85,174,0.18);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--blue-dark);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 60% 10%, rgba(204,34,34,0.25) 0%, transparent 55%),
        radial-gradient(circle at 10% 80%, rgba(88,128,212,0.25) 0%, transparent 55%),
        linear-gradient(160deg, #1a3a7a 0%, #0d1f4a 60%, #0a1530 100%);
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      border: 60px solid rgba(255,255,255,0.03);
      top: -150px; right: -150px;
      z-index: 0;
      pointer-events: none;
    }

    header {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 32px 20px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .logo-text {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(14px, 3.5vw, 28px);
      color: var(--yellow);
      text-shadow: 3px 3px 0 var(--yellow-dark), 5px 5px 0 rgba(0,0,0,0.3), 0 0 40px rgba(247,201,72,0.5);
      letter-spacing: 2px;
      animation: logoFloat 3s ease-in-out infinite;
    }
    @keyframes logoFloat {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }
    header h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(7px, 1.8vw, 11px);
      color: var(--yellow);
      text-shadow: 2px 2px 0 var(--yellow-dark);
      letter-spacing: 1px;
      line-height: 1.7;
    }
    .subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.65);
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .subtitle-godot {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: rgba(247,201,72,0.7);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    main {
      position: relative;
      z-index: 10;
      max-width: 860px;
      margin: 0 auto 60px;
      padding: 0 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 8px 40px var(--shadow), 0 2px 0 var(--yellow) inset;
      padding: 28px;
      border: 2px solid rgba(255,255,255,0.9);
    }

    /* ── LOADER ── */
    #loader { text-align: center; padding: 60px 20px; }
    .loader-ball {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: linear-gradient(to bottom, var(--red) 50%, white 50%);
      border: 4px solid #222;
      margin: 0 auto 20px;
      animation: spin 0.9s linear infinite;
      position: relative;
    }
    .loader-ball::after {
      content: '';
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%,-50%);
      width: 16px; height: 16px;
      border-radius: 50%;
      background: white;
      border: 4px solid #222;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loader p {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--blue);
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── SEARCH ── */
    .search-section { display: none; }
    .search-section.visible { display: block; }

    .search-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--blue-dark);
      display: block;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
      max-width: 480px;
    }
    #pokemon-input {
      width: 100%;
      padding: 14px 44px 14px 16px;
      font-size: 15px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      border: 3px solid var(--blue-light);
      border-radius: 12px;
      outline: none;
      color: var(--text);
      background: var(--offwhite);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #pokemon-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(40,85,174,0.15);
    }
    .sprite-preview {
      position: absolute;
      right: 8px; top: 50%;
      transform: translateY(-50%);
      width: 36px; height: 36px;
      object-fit: contain;
    }
    .autocomplete-list {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: white;
      border: 2px solid var(--blue-light);
      border-radius: 10px;
      max-height: 220px;
      overflow-y: auto;
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      display: none;
    }
    .autocomplete-list.open { display: block; }
    .autocomplete-item {
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.12s;
    }
    .autocomplete-item:hover, .autocomplete-item.active { background: var(--offwhite); }
    .autocomplete-item img { width: 30px; height: 30px; object-fit: contain; }
    .autocomplete-item .dex-num { font-size: 11px; color: var(--gray); font-weight: 600; }
    .autocomplete-item .rarity-pill {
      margin-left: auto;
      font-size: 10px;
      font-weight: 800;
      padding: 2px 7px;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* ── RARITY COLORS ── */
    .rarity-Common      { background: #e0e0e0; color: #444; }
    .rarity-Uncommon    { background: #a0c840; color: #1a3a00; }
    .rarity-Rare        { background: #4090e0; color: #fff; }
    .rarity-VeryRare    { background: #9040d0; color: #fff; }
    .rarity-ExtremelyRare { background: #e04020; color: #fff; }
    .rarity-Legendary   { background: linear-gradient(135deg, #f7c948, #e07820); color: #fff; }

    /* ── TYPE BADGE ── */
    .type-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 800;
      color: white;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .type-Normal    { background: #a8a878; }
    .type-Fire      { background: #f08030; }
    .type-Water     { background: #6890f0; }
    .type-Electric  { background: #f8d030; color: #333; }
    .type-Grass     { background: #78c850; }
    .type-Ice       { background: #98d8d8; color: #333; }
    .type-Fighting  { background: #c03028; }
    .type-Poison    { background: #a040a0; }
    .type-Ground    { background: #e0c068; color: #333; }
    .type-Flying    { background: #a890f0; }
    .type-Psychic   { background: #f85888; }
    .type-Bug       { background: #a8b820; }
    .type-Rock      { background: #b8a038; }
    .type-Ghost     { background: #705898; }
    .type-Dragon    { background: #7038f8; }
    .type-Dark      { background: #705848; }
    .type-Steel     { background: #b8b8d0; color: #333; }
    .type-Fairy     { background: #ee99ac; }

    .divider {
      border: none;
      border-top: 2px dashed #d0d8ee;
      margin: 24px 0;
    }

    /* ── RESULTS ── */
    #results { display: none; }
    #results.visible { display: block; }

    .selected-info {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      padding: 14px 18px;
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
      border-radius: 14px;
      color: white;
    }
    .selected-sprite {
      width: 72px; height: 72px;
      object-fit: contain;
      image-rendering: pixelated;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    }
    .selected-name {
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      line-height: 1.8;
    }
    .selected-meta {
      font-size: 13px;
      color: rgba(255,255,255,0.85);
      font-weight: 600;
      margin-top: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .rarity-tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    /* ── TYPE GROUP SECTIONS ── */
    .type-group-section { margin-bottom: 24px; }
    .type-group-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      padding: 10px 16px;
      border-radius: 10px;
      color: white;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
    }
    .type-count {
      margin-left: auto;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 800;
      background: rgba(255,255,255,0.25);
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* Type header bg colors */
    .th-Normal    { background: linear-gradient(135deg, #a8a878, #807860); }
    .th-Fire      { background: linear-gradient(135deg, #f08030, #c05010); }
    .th-Water     { background: linear-gradient(135deg, #6890f0, #4060c0); }
    .th-Electric  { background: linear-gradient(135deg, #c8a010, #a07800); }
    .th-Grass     { background: linear-gradient(135deg, #58a830, #387818); }
    .th-Ice       { background: linear-gradient(135deg, #68b8b8, #408888); }
    .th-Fighting  { background: linear-gradient(135deg, #c03028, #901820); }
    .th-Poison    { background: linear-gradient(135deg, #a040a0, #702070); }
    .th-Ground    { background: linear-gradient(135deg, #b09040, #806820); }
    .th-Flying    { background: linear-gradient(135deg, #7870d0, #5050a0); }
    .th-Psychic   { background: linear-gradient(135deg, #f85888, #c02858); }
    .th-Bug       { background: linear-gradient(135deg, #889010, #586000); }
    .th-Rock      { background: linear-gradient(135deg, #a09038, #706018); }
    .th-Ghost     { background: linear-gradient(135deg, #705898, #503070); }
    .th-Dragon    { background: linear-gradient(135deg, #5028d8, #3008a8); }
    .th-Dark      { background: linear-gradient(135deg, #705848, #402820); }
    .th-Steel     { background: linear-gradient(135deg, #9898b8, #686880); }
    .th-Fairy     { background: linear-gradient(135deg, #e87898, #b84870); }

    /* ── POKEMON GRID ── */
    .pokemon-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
    }
    .pokemon-card {
      background: var(--offwhite);
      border: 2px solid #d8e0f0;
      border-radius: 12px;
      padding: 10px 8px 8px;
      text-align: center;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    }
    .pokemon-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(40,85,174,0.2);
      border-color: var(--blue-light);
    }
    .pokemon-card img {
      width: 60px; height: 60px;
      object-fit: contain;
      image-rendering: pixelated;
    }
    .pokemon-card .pname {
      font-size: 11px; font-weight: 800;
      color: var(--text); line-height: 1.3;
      margin-top: 4px; display: block;
    }
    .pokemon-card .pdex {
      font-size: 10px; color: var(--gray); font-weight: 600;
    }
    .pokemon-card .ptypes {
      margin-top: 4px;
      display: flex; gap: 3px;
      justify-content: center; flex-wrap: wrap;
    }
    .pokemon-card .prarity {
      margin-top: 4px;
      font-size: 10px; font-weight: 800;
      padding: 1px 6px; border-radius: 10px;
      display: inline-block;
    }

    /* ── DITTO SECTION ── */
    .ditto-section {
      margin-top: 28px;
      padding: 16px 18px;
      background: linear-gradient(135deg, #fff5fc 0%, #fde8f8 100%);
      border: 2px dashed #d090c0;
      border-radius: 14px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .ditto-section img {
      width: 64px; height: 64px;
      object-fit: contain;
      image-rendering: pixelated;
    }
    .ditto-section h4 {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: #903060;
      margin-bottom: 6px;
    }
    .ditto-section p { font-size: 12px; color: #604050; font-weight: 600; }

    /* ── NO RESULTS ── */
    .no-results {
      text-align: center;
      padding: 32px 20px;
      background: #f8f0ff;
      border-radius: 14px;
      border: 2px solid #d0a0f0;
    }
    .no-results .icon { font-size: 36px; margin-bottom: 12px; }
    .no-results h3 {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: #6020a0;
      margin-bottom: 8px;
    }
    .no-results p { font-size: 13px; color: #604080; font-weight: 600; }

    .results-loading { text-align: center; padding: 40px; }
    .results-loading .loader-ball { width: 40px; height: 40px; }

    footer {
      position: relative; z-index: 10;
      text-align: center; padding: 20px;
      color: rgba(255,255,255,0.4);
      font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
    }

    @media (max-width: 600px) {
      .pokemon-grid { grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); }
    }
  </style>
</head>

  'zapdos': 'Legendary',
  'zebstrika': 'Rare',
  'zekrom': 'Legendary',
  'zeraora': 'Legendary',
  'zigzagoon': 'Common',
  'zoroark': 'VeryRare',
  'zorua': 'VeryRare',
  'zubat': 'Common',
  'zweilous': 'ExtremelyRare',
  'zygarde': 'Legendary',
};

// Total entries: 807

// SUMMARY BY RARITY:
// Common (82): barbaracle, barboach, basculin, beautifly, binacle, braviary, bruxish, carbink, carvanha, cascoon, crabominable, crabrawler, crobat, cryogonal, delibird, diglett, dugtrio, durant, dustox, electrode...
// Uncommon (61): arbok, ariados, azumarill, azurill, bellossom, bellsprout, charjabug, cherrim, cherubi, combee, crustle, cutiefly, ducklett, dwebble, ekans, emolga, fearow, gastrodon, gloom, goldeen...
// Rare (163): accelgor, aipom, ambipom, audino, beedrill, beheeyem, bewear, bibarel, bidoof, blitzle, bouffalant, buneary, bunnelby, burmy, butterfree, cacnea, cacturne, carnivine, castform, caterpie...
// VeryRare (130): absol, aggron, ampharos, aron, avalugg, baltoy, banette, beartic, bergmite, blissey, boldore, bounsweet, buizel, chansey, chinchou, clamperl, clauncher, clawitzer, claydol, conkeldurr...
// ExtremelyRare (293): abomasnow, abra, aegislash, aerodactyl, alakazam, alomomola, altaria, amaura, amoonguss, anorith, araquanid, arcanine, archen, archeops, armaldo, aromatisse, aurorus, axew, bagon, bastiodon...
// Legendary (78): arceus, articuno, azelf, blacephalon, buzzwole, celebi, celesteela, cobalion, cosmoem, cosmog, cresselia, darkrai, deoxys, dialga, diancie, entei, genesect, giratina, groudon, guzzlord...

function getRarity(pokemonName) {
  const name = pokemonName.toLowerCase();
  if (RARITY_DATA[name]) return RARITY_DATA[name];
  const base = name.split('-')[0];
  if (RARITY_DATA[base]) return RARITY_DATA[base];
  return 'Common';
}
const RARITY_ORDER = ['Common','Uncommon','Rare','VeryRare','ExtremelyRare','Legendary'];
const RARITY_LABEL = {
  'Common':        'Common',
  'Uncommon':      'Uncommon',
  'Rare':          'Rare',
  'VeryRare':      'Very Rare',
  'ExtremelyRare': 'Extremely Rare',
  'Legendary':     'Legendary'
};

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
const MAX_DEX = 807;
let speciesDB  = {};   // id -> { name, displayName, types[], rarity }
let pokemonList = [];  // [{id, name, displayName}] sorted by id
let typeMap = {};      // type -> Set<id>

let selectedId = null;

// ═══════════════════════════════════════════════
//  LOAD DATA
// ═══════════════════════════════════════════════
function fetchWithTimeout(url, ms = 15000) {
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), ms);
  return fetch(url, { signal: controller.signal })
    .then(r => { clearTimeout(id); return r.json(); })
    .catch(e => { clearTimeout(id); throw e; });
}

async function loadAllData() {
  // Update loader message
  document.querySelector('#loader p').textContent = 'Connecting to PokéAPI...';

  // Fetch all species list (#1-807)
  const speciesList = await fetchWithTimeout('https://pokeapi.co/api/v2/pokemon-species?limit=807&offset=0', 20000);

  // Build basic list
  pokemonList = [];
  for (const sp of speciesList.results) {
    const id = parseInt(sp.url.split('/').filter(Boolean).pop());
    if (id < 1 || id > MAX_DEX) continue;
    const display = toDisplayName(sp.name);
    pokemonList.push({ id, name: sp.name, displayName: display });
    speciesDB[id] = {
      name: sp.name,
      displayName: display,
      types: [],
      rarity: getRarity(sp.name)
    };
  }
  pokemonList.sort((a,b) => a.id - b.id);

  document.getElementById('loader').style.display = 'none';
  document.getElementById('search-section').classList.add('visible');
  initSearch();
}

function toDisplayName(name) {
  return name.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

// ═══════════════════════════════════════════════
//  SEARCH / AUTOCOMPLETE
// ═══════════════════════════════════════════════
function initSearch() {
  const input = document.getElementById('pokemon-input');
  const list  = document.getElementById('autocomplete-list');
  let activeIdx = -1;

  function getSuggestions(val) {
    const v = val.toLowerCase().trim();
    if (!v) return [];
    return pokemonList
      .filter(p => p.name.includes(v) || p.displayName.toLowerCase().includes(v))
      .slice(0, 12);
  }

  function rarityPillHtml(rarity) {
    return `<span class="rarity-pill rarity-${rarity}">${RARITY_LABEL[rarity]}</span>`;
  }

  function renderSuggestions(items) {
    list.innerHTML = '';
    activeIdx = -1;
    if (!items.length) { list.classList.remove('open'); return; }
    items.forEach((item) => {
      const rarity = speciesDB[item.id]?.rarity || 'Common';
      const div = document.createElement('div');
      div.className = 'autocomplete-item';
      div.innerHTML = `
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${item.id}.png"
             alt="${item.displayName}" onerror="this.style.display='none'" />
        <span>${item.displayName}</span>
        <span class="dex-num">#${String(item.id).padStart(3,'0')}</span>
        ${rarityPillHtml(rarity)}
      `;
      div.addEventListener('mousedown', () => selectPokemon(item));
      list.appendChild(div);
    });
    list.classList.add('open');
  }

  input.addEventListener('input', () => renderSuggestions(getSuggestions(input.value)));
  input.addEventListener('keydown', e => {
    const items = list.querySelectorAll('.autocomplete-item');
    if (e.key === 'ArrowDown') {
      activeIdx = Math.min(activeIdx + 1, items.length - 1);
      items.forEach((el,i) => el.classList.toggle('active', i === activeIdx));
      e.preventDefault();
    } else if (e.key === 'ArrowUp') {
      activeIdx = Math.max(activeIdx - 1, 0);
      items.forEach((el,i) => el.classList.toggle('active', i === activeIdx));
      e.preventDefault();
    } else if (e.key === 'Enter') {
      if (activeIdx >= 0) items[activeIdx].dispatchEvent(new MouseEvent('mousedown'));
      e.preventDefault();
    } else if (e.key === 'Escape') {
      list.classList.remove('open');
    }
  });
  input.addEventListener('blur',  () => setTimeout(() => list.classList.remove('open'), 150));
  input.addEventListener('focus', () => { if (input.value) renderSuggestions(getSuggestions(input.value)); });
}

async function selectPokemon(item) {
  selectedId = item.id;
  document.getElementById('pokemon-input').value = item.displayName;
  document.getElementById('autocomplete-list').classList.remove('open');

  const preview = document.getElementById('sprite-preview');
  preview.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${item.id}.png`;
  preview.style.display = 'block';

  await ensureTypesLoaded(item.id);
  showResults();
}

async function ensureTypesLoaded(id) {
  const sp = speciesDB[id];
  if (sp.types.length) return;
  try {
    const data = await fetchWithTimeout(`https://pokeapi.co/api/v2/pokemon/${id}/`, 10000);
    sp.types = data.types.map(t => t.type.name.charAt(0).toUpperCase() + t.type.name.slice(1));
  } catch(e) {
    sp.types = [];
  }
}

// ═══════════════════════════════════════════════
//  RESULTS
// ═══════════════════════════════════════════════
async function showResults() {
  const resultsEl = document.getElementById('results');
  const divider   = document.getElementById('results-divider');
  resultsEl.style.display = 'block';
  resultsEl.classList.add('visible');
  divider.style.display = 'block';

  const sp = speciesDB[selectedId];

  // Show loading state with selected info
  resultsEl.innerHTML = selectedInfoHtml(sp) + `
    <div class="results-loading"><div class="loader-ball"></div></div>
  `;

  const myRarity = sp.rarity;
  const myTypes  = sp.types; // already loaded

  // Find all pokemon sharing same rarity AND at least one type
  // We need to batch-load types for all same-rarity pokemon we don't have yet
  const sameRarity = pokemonList.filter(p => {
    const psp = speciesDB[p.id];
    return p.id !== selectedId && psp && psp.rarity === myRarity;
  });

  // Batch load types for same-rarity pokemon (40 at a time)
  const needTypes = sameRarity.filter(p => !speciesDB[p.id].types.length);
  const BATCH = 40;
  for (let i = 0; i < needTypes.length; i += BATCH) {
    const chunk = needTypes.slice(i, i + BATCH);
    await Promise.allSettled(chunk.map(p =>
      fetch(`https://pokeapi.co/api/v2/pokemon/${p.id}/`, { signal: AbortSignal.timeout ? AbortSignal.timeout(8000) : undefined })
        .then(r => r.json())
        .then(d => {
          if (speciesDB[p.id]) {
            speciesDB[p.id].types = d.types.map(t =>
              t.type.name.charAt(0).toUpperCase() + t.type.name.slice(1)
            );
          }
        })
        .catch(() => {})
    ));
  }

  // Now filter by shared type
  // Group by shared type(s)
  const typeGroups = {}; // type -> [pokemon]
  for (const p of sameRarity) {
    const psp = speciesDB[p.id];
    if (!psp || !psp.types.length) continue;
    const sharedTypes = myTypes.filter(t => psp.types.includes(t));
    for (const t of sharedTypes) {
      if (!typeGroups[t]) typeGroups[t] = [];
      typeGroups[t].push(p);
    }
  }

  // Sort each group by dex id
  for (const t of Object.keys(typeGroups)) {
    typeGroups[t].sort((a,b) => a.id - b.id);
  }

  // Sort type keys by the selected pokemon's type order (primary type first)
  const sortedTypes = myTypes.filter(t => typeGroups[t] && typeGroups[t].length > 0);

  // Render
  let html = selectedInfoHtml(sp);

  if (sortedTypes.length === 0) {
    html += `
      <div class="no-results">
        <div class="icon">🔍</div>
        <h3>No compatible Pokémon found</h3>
        <p>No other <strong>${RARITY_LABEL[myRarity]}</strong> Pokémon share a type with <strong>${sp.displayName}</strong>.<br/>
        Ditto can still breed with any Pokémon regardless of type or rarity.</p>
      </div>
    `;
  } else {
    for (const type of sortedTypes) {
      const members = typeGroups[type];
      html += `
        <div class="type-group-section">
          <div class="type-group-header th-${type}">
            <span class="type-badge type-${type}">${type}</span>
            Compatible Pokémon
            <span class="type-count">${members.length}</span>
          </div>
          <div class="pokemon-grid">
            ${members.map(m => renderPokemonCard(m)).join('')}
          </div>
        </div>
      `;
    }
  }

  // Ditto always at bottom
  html += `
    <div class="ditto-section">
      <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/132.png" alt="Ditto" />
      <div>
        <h4>🔮 Ditto — Always Compatible</h4>
        <p>Ditto ignores type and rarity rules and can breed with <strong>${sp.displayName}</strong> regardless.<br/>
        The egg produced will always be a <strong>${sp.displayName}</strong> (female parent determines the egg species).</p>
      </div>
    </div>
  `;

  resultsEl.innerHTML = html;
}

function selectedInfoHtml(sp) {
  const rarityClass = `rarity-${sp.rarity}`;
  const typeHtml = (sp.types||[]).map(t => `<span class="type-badge type-${t}">${t}</span>`).join('');
  return `
    <div class="selected-info">
      <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${selectedId}.png"
           class="selected-sprite" alt="${sp.displayName}" />
      <div>
        <div class="selected-name">${sp.displayName}
          <span style="font-size:9px;color:rgba(255,255,255,0.6)"> #${String(selectedId).padStart(3,'0')}</span>
        </div>
        <div class="selected-meta">
          ${typeHtml}
          <span class="rarity-tag ${rarityClass}">${RARITY_LABEL[sp.rarity]}</span>
        </div>
      </div>
    </div>
  `;
}

function renderPokemonCard(m) {
  const sp = speciesDB[m.id];
  const types = sp?.types || [];
  const rarity = sp?.rarity || 'Common';
  const typeHtml = types.map(t => `<span class="type-badge type-${t}">${t}</span>`).join('');
  return `
    <div class="pokemon-card">
      <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${m.id}.png"
           alt="${m.displayName}" loading="lazy"
           onerror="this.src=''" />
      <span class="pname">${m.displayName}</span>
      <span class="pdex">#${String(m.id).padStart(3,'0')}</span>
      ${typeHtml ? `<div class="ptypes">${typeHtml}</div>` : ''}
      <span class="prarity ${`rarity-${rarity}`}">${RARITY_LABEL[rarity]}</span>
    </div>
  `;
}

//  INIT

loadAllData().catch(err => {

});
